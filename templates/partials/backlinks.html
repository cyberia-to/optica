{% if backlinks %}
<section id="mentions" class="backlinks" aria-label="Mentions">
  <h2>Mentions</h2>
  <ul class="backlinks-list">
    {% for bl in backlinks %}
    <li>
      <a href="{{ bl.url }}" class="backlink-title">{{ bl.title }}</a>
    </li>
    {% endfor %}
  </ul>
</section>
{% endif %}
